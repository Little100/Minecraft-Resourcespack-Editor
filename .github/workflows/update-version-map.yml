name: Update Version Map and Deploy

on:
  schedule:
    # 每天北京时间 08:00 执行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-version-map:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch versions from Wiki
        run: node scripts/fetch-versions.js
      
      - name: Check changes
        id: git_status
        run: |
          if git diff --exit-code public/version_map/version_map.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Create commit
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/version_map/version_map.json
          git commit -m "docs: Update version map from Wiki ($(date +'%Y-%m-%d'))"
      
      - name: Push changes
        if: steps.git_status.outputs.changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  deploy:
    needs: update-version-map
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/version_map'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4